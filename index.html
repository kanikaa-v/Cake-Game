<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Layer It Up — Cake Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#241b17;
    --panel:#33261f;
    --panel-line:#4a382e;
    --cream:#fff3e2;
    --cream-dim:#d8c6b4;
    --pink:#ff8fab;
    --mint:#8fe3c0;
    --lavender:#c7a6ff;
    --gold:#e8b84b;
    --cherry:#e2483d;
    --choco:#6b4226;
    --stand:#4a382e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 10%, rgba(232,184,75,0.06), transparent 40%),
      var(--bg);
    color:var(--cream);
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }

  /* ---------- GAME AREA ---------- */
  .stage{
    max-width:640px;
    margin:0 auto;
    padding:56px 20px 60px;
    text-align:center;
  }
  h1.title{
    font-family:'Pacifico',cursive;
    font-size:clamp(34px,6vw,52px);
    color:var(--gold);
    margin:0 0 4px;
    text-shadow:0 3px 0 rgba(0,0,0,0.25);
  }
  .subtitle{
    color:var(--cream-dim);
    font-size:14px;
    margin-bottom:28px;
  }

  .steps{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:30px;
  }
  .step-dot{
    width:34px;height:34px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;
    font-size:14px;
    background:var(--panel);
    border:2px solid var(--panel-line);
    color:var(--cream-dim);
  }
  .step-dot.active{ border-color:var(--gold); color:var(--gold); background:#3a2c22; }
  .step-dot.complete{ border-color:var(--mint); color:var(--bg); background:var(--mint); }

  .cake-display{
    position:relative;
    height:260px;
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
    justify-content:flex-end;
    margin:0 auto 30px;
    width:220px;
  }
  .stand{
    width:220px;
    height:14px;
    background:var(--stand);
    border-radius:6px;
    box-shadow:0 6px 0 rgba(0,0,0,0.3);
    position:relative;
    z-index:0;
  }
  .stand::after{
    content:'';
    position:absolute;
    left:50%;
    top:14px;
    width:26px;height:60px;
    background:var(--stand);
    transform:translateX(-50%);
    border-radius:0 0 4px 4px;
  }
  .layer{
    width:180px;
    height:52px;
    border-radius:8px;
    margin-bottom:-6px;
    position:relative;
    box-shadow:inset 0 -6px 0 rgba(0,0,0,0.12), 0 4px 8px rgba(0,0,0,0.25);
    animation:drop .45s cubic-bezier(.34,1.56,.64,1);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1;
  }
  .layer:nth-of-type(2){ width:160px; }
  .layer:nth-of-type(3){ width:140px; }
  @keyframes drop{
    from{ transform:translateY(-40px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .topping-sprinkles span{
    position:absolute;
    width:4px;height:10px;
    border-radius:2px;
  }
  .topping-cherry{
    position:absolute;
    top:-10px;
    width:16px;height:16px;
    border-radius:50%;
    background:var(--cherry);
    box-shadow:0 2px 3px rgba(0,0,0,0.3);
  }
  .topping-drizzle{
    position:absolute;
    top:-4px;left:0;right:0;
    height:14px;
    background:
      repeating-linear-gradient(115deg, transparent 0 6px, var(--choco) 6px 10px);
    -webkit-mask:linear-gradient(#000,transparent 85%);
    mask:linear-gradient(#000,transparent 85%);
    opacity:.85;
  }
  .topping-swirl{
    position:absolute;
    top:-16px;
    width:34px;height:22px;
    background:var(--cream);
    border-radius:50% 50% 45% 45% / 65% 65% 35% 35%;
    box-shadow:0 2px 3px rgba(0,0,0,0.15);
  }
  .topping-swirl::after{
    content:'';
    position:absolute;
    top:-8px; left:50%;
    width:12px;height:12px;
    background:var(--cream);
    border-radius:50%;
    transform:translateX(-50%);
  }
  .topping-candle{
    position:absolute;
    top:-30px;
    width:6px;height:26px;
    background:repeating-linear-gradient(180deg, var(--pink) 0 6px, var(--cream) 6px 12px);
    border-radius:2px;
  }
  .topping-candle::after{
    content:'';
    position:absolute;
    top:-9px; left:50%;
    width:6px;height:9px;
    background:var(--gold);
    border-radius:50% 50% 50% 50% / 65% 65% 35% 35%;
    transform:translateX(-50%);
    box-shadow:0 0 6px rgba(232,184,75,0.7);
  }
  .topping-strawberry{
    position:absolute;
    top:-14px;
    width:16px;height:18px;
    background:var(--cherry);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow:0 2px 3px rgba(0,0,0,0.25);
  }
  .topping-strawberry::before{
    content:'';
    position:absolute;
    top:-5px; left:50%;
    width:12px;height:6px;
    background:var(--mint);
    border-radius:40%;
    transform:translateX(-50%) rotate(0deg);
  }
  .topping-strawberry::after{
    content:'';
    position:absolute;
    top:2px; left:3px; right:3px; bottom:3px;
    background:
      radial-gradient(circle 1px, var(--gold) 90%, transparent 100%) 2px 2px/6px 6px,
      radial-gradient(circle 1px, var(--gold) 90%, transparent 100%) 5px 6px/6px 6px;
    opacity:.7;
  }
  .topping-choco-chips span{
    position:absolute;
    width:5px;height:5px;
    border-radius:50%;
    background:var(--choco);
    box-shadow:0 1px 1px rgba(0,0,0,0.3);
  }

  .panel-card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:14px;
    padding:22px;
    text-align:left;
  }
  .panel-title{
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--cream-dim);
    margin:0 0 14px;
    text-align:center;
  }
  .choice-row{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-bottom:10px;
  }
  .swatch{
    width:56px;height:56px;
    border-radius:50%;
    border:3px solid transparent;
    cursor:pointer;
    transition:transform .15s ease, border-color .15s ease;
  }
  .swatch:hover{ transform:scale(1.08); }
  .swatch.selected{ border-color:var(--gold); transform:scale(1.1); }

  .topping-btn{
    width:80px;
    height:80px;
    border-radius:12px;
    background:#2a201b;
    border:2px solid var(--panel-line);
    cursor:pointer;
    color:var(--cream);
    font-size:26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    transition:transform .15s ease, border-color .15s ease;
  }
  .topping-btn span.label{
    font-size:10px;
    color:var(--cream-dim);
    font-family:'IBM Plex Mono',monospace;
  }
  .topping-btn:hover{ transform:scale(1.05); }
  .topping-btn.selected{ border-color:var(--mint); background:#2e3b30; }

  .actions{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:22px;
  }
  button.primary{
    background:var(--gold);
    color:#241b17;
    border:none;
    padding:11px 26px;
    border-radius:30px;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    transition:transform .15s ease;
  }
  button.primary:disabled{
    opacity:.35;
    cursor:not-allowed;
  }
  button.primary:not(:disabled):hover{ transform:translateY(-2px); }
  button.ghost{
    background:none;
    border:1px solid var(--panel-line);
    color:var(--cream-dim);
    padding:11px 22px;
    border-radius:30px;
    cursor:pointer;
    font-size:14px;
  }

  .finished-msg{
    font-family:'Pacifico',cursive;
    color:var(--mint);
    font-size:24px;
    margin:0 0 6px;
  }
  .finished-sub{
    color:var(--cream-dim);
    font-size:13px;
    margin-bottom:20px;
  }

  @media (max-width:560px){
    .stage{ padding-top:40px; }
  }
</style>
</head>
<body>

  <!-- GAME -->
  <div class="stage">
    <h1 class="title">Layer It Up</h1>
    <div class="subtitle">build a 3-layer cake — color by color, topping by topping</div>

    <div class="steps" id="stepDots"></div>

    <div class="cake-display" id="cakeDisplay">
      <div class="stand"></div>
    </div>

    <div class="panel-card" id="choicePanel"></div>
  </div>

<script>
/* ---------------- GAME LOGIC ---------------- */
const COLORS = [
  { name:'pink', hex:'var(--pink)' },
  { name:'mint', hex:'var(--mint)' },
  { name:'lavender', hex:'var(--lavender)' }
];
// Standard toppings for layers 1 & 2
const TOPPINGS = [
  { name:'sprinkles', icon:'✦' },
  { name:'cherry', icon:'●' },
  { name:'drizzle', icon:'〜' }
];
// Extra, more "desirable" toppings — only offered on the final (top) layer
const TOPPINGS_FINAL = [
  { name:'sprinkles', icon:'✦' },
  { name:'cherry', icon:'●' },
  { name:'drizzle', icon:'〜' },
  { name:'swirl', icon:'☁' },
  { name:'strawberry', icon:'🍓' },
  { name:'candle', icon:'🕯' },
  { name:'chocochips', icon:'⚈' }
];

let layers = [null, null, null]; // {color, topping}
let step = 0; // 0,1,2 => layer index; 3 => finished
let subStep = 'color'; // 'color' | 'topping'

const stepDots = document.getElementById('stepDots');
const cakeDisplay = document.getElementById('cakeDisplay');
const choicePanel = document.getElementById('choicePanel');

function renderStepDots(){
  stepDots.innerHTML = '';
  for(let i=0;i<3;i++){
    const dot = document.createElement('div');
    dot.className = 'step-dot';
    if(layers[i]) dot.classList.add('complete');
    else if(i === step) dot.classList.add('active');
    dot.textContent = layers[i] ? '✓' : (i+1);
    stepDots.appendChild(dot);
  }
}

function renderCake(){
  // remove existing layers, keep stand
  cakeDisplay.querySelectorAll('.layer').forEach(el => el.remove());
  layers.forEach((layer) => {
    if(!layer) return;
    const div = document.createElement('div');
    div.className = 'layer';
    div.style.background = COLORS.find(c=>c.name===layer.color).hex;
    if(layer.topping === 'sprinkles'){
      const wrap = document.createElement('div');
      wrap.className = 'topping-sprinkles';
      wrap.style.position='absolute'; wrap.style.top='-6px'; wrap.style.left='0'; wrap.style.right='0'; wrap.style.height='14px';
      const sprinkColors = ['var(--gold)','var(--cherry)','var(--cream)'];
      for(let i=0;i<10;i++){
        const s = document.createElement('span');
        s.style.left = (5 + i*9) + '%';
        s.style.top = (Math.random()*4)+'px';
        s.style.background = sprinkColors[i % sprinkColors.length];
        s.style.transform = `rotate(${Math.random()*60-30}deg)`;
        wrap.appendChild(s);
      }
      div.appendChild(wrap);
    } else if(layer.topping === 'cherry'){
      const c = document.createElement('div');
      c.className = 'topping-cherry';
      c.style.left = '50%';
      c.style.transform = 'translateX(-50%)';
      div.appendChild(c);
    } else if(layer.topping === 'drizzle'){
      const d = document.createElement('div');
      d.className = 'topping-drizzle';
      div.appendChild(d);
    } else if(layer.topping === 'swirl'){
      const s = document.createElement('div');
      s.className = 'topping-swirl';
      s.style.left = '50%';
      s.style.transform = 'translateX(-50%)';
      div.appendChild(s);
    } else if(layer.topping === 'strawberry'){
      const s = document.createElement('div');
      s.className = 'topping-strawberry';
      s.style.left = '50%';
      s.style.transform = 'translateX(-50%)';
      div.appendChild(s);
    } else if(layer.topping === 'candle'){
      const c = document.createElement('div');
      c.className = 'topping-candle';
      c.style.left = '50%';
      c.style.transform = 'translateX(-50%)';
      div.appendChild(c);
    } else if(layer.topping === 'chocochips'){
      const wrap = document.createElement('div');
      wrap.style.position='absolute'; wrap.style.top='-8px'; wrap.style.left='0'; wrap.style.right='0'; wrap.style.height='16px';
      wrap.className = 'topping-choco-chips';
      for(let i=0;i<8;i++){
        const s = document.createElement('span');
        s.style.left = (8 + i*11) + '%';
        s.style.top = (Math.random()*8)+'px';
        wrap.appendChild(s);
      }
      div.appendChild(wrap);
    }
    cakeDisplay.insertBefore(div, cakeDisplay.firstChild.nextSibling === null ? null : cakeDisplay.querySelector('.stand'));
    cakeDisplay.appendChild(div); // reorder handled by flex column-reverse
  });
}

function renderPanel(){
  if(step >= 3){
    choicePanel.innerHTML = `
      <p class="finished-msg">🎉 Your cake is ready!</p>
      <p class="finished-sub">three layers, three colors, three toppings — baked to spec.</p>
      <div class="actions">
        <button class="primary" onclick="resetGame()">Bake Another Cake</button>
      </div>
    `;
    return;
  }

  if(subStep === 'color'){
    choicePanel.innerHTML = `
      <p class="panel-title">layer ${step+1} — pick a frosting color</p>
      <div class="choice-row" id="colorRow"></div>
      <div class="actions">
        <button class="primary" id="colorNextBtn" disabled onclick="goToTopping()">Next: Topping →</button>
      </div>
    `;
    const row = document.getElementById('colorRow');
    COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.background = c.hex;
      sw.onclick = () => selectColor(c.name);
      if(layers[step] && layers[step].color === c.name) sw.classList.add('selected');
      row.appendChild(sw);
    });
    if(layers[step] && layers[step].color){
      document.getElementById('colorNextBtn').disabled = false;
    }
  } else {
    const isFinalLayer = step === 2;
    const toppingSet = isFinalLayer ? TOPPINGS_FINAL : TOPPINGS;
    choicePanel.innerHTML = `
      <p class="panel-title">layer ${step+1} — pick a topping${isFinalLayer ? ' (the finale — go big!)' : ''}</p>
      <div class="choice-row" id="toppingRow" style="flex-wrap:wrap; row-gap:12px;"></div>
      <div class="actions">
        <button class="ghost" onclick="backToColor()">← Back</button>
        <button class="primary" id="toppingNextBtn" disabled onclick="confirmLayer()">${step < 2 ? 'Next Layer →' : 'Finish Cake 🎂'}</button>
      </div>
    `;
    const row = document.getElementById('toppingRow');
    toppingSet.forEach(t => {
      const btn = document.createElement('div');
      btn.className = 'topping-btn';
      btn.innerHTML = `${t.icon}<span class="label">${t.name}</span>`;
      btn.onclick = () => selectTopping(t.name);
      if(layers[step] && layers[step].topping === t.name) btn.classList.add('selected');
      row.appendChild(btn);
    });
    if(layers[step] && layers[step].topping){
      document.getElementById('toppingNextBtn').disabled = false;
    }
  }
}

function selectColor(name){
  layers[step] = { color:name, topping: layers[step] ? layers[step].topping : null };
  renderPanel();
}
function goToTopping(){
  subStep = 'topping';
  renderPanel();
}
function backToColor(){
  subStep = 'color';
  renderPanel();
}
function selectTopping(name){
  layers[step].topping = name;
  renderPanel();
}
function confirmLayer(){
  renderCake();
  renderStepDots();
  if(step < 2){
    step++;
    subStep = 'color';
  } else {
    step = 3;
  }
  renderStepDots();
  renderPanel();
}
function resetGame(){
  layers = [null,null,null];
  step = 0;
  subStep = 'color';
  renderCake();
  renderStepDots();
  renderPanel();
}

renderStepDots();
renderPanel();
</script>
</body>
</html>
